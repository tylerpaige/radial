<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radial rays</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    * {
      margin: 0;
    }

    html {
      -moz-text-size-adjust: none;
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
    }

    body {
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
    }

    input,
    button,
    textarea,
    select {
      font: inherit;
    }

    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      overflow-wrap: break-word;
    }
  </style>
  <style>

    html {
      touch-action: manipulation;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }

    #ray-stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      touch-action: none;
      cursor: default;
      -webkit-tap-highlight-color: transparent;
    }

    #debug-readout {
      position: fixed;
      z-index: 2;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      color: #f0f0f0;
      background: rgba(0, 0, 0, 0.78);
      border-radius: 6px;
      pointer-events: none;
      user-select: none;
      text-align: center;
    }

    #ray-stage .ray-label {
      pointer-events: none;
      user-select: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <svg
    id="ray-stage"
    xmlns="http://www.w3.org/2000/svg"
    role="application"
    tabindex="-1"
    aria-label="Radial rays from the top-left corner. Swipe left or tap the left third of the screen to move forward in the cycle; swipe right or tap the right third to move backward. Arrow keys: Left and Down forward; Up and Right backward."
  ></svg>
  <div id="debug-readout" aria-hidden="true"></div>

  <script type="text/javascript">
    const CONFIG = {
      /** Number of wedge rays from the top-left corner across the viewport. */
      RAY_COUNT: 14,
      /**
       * Extra angular weight at the selected ray before normalization (0 = equal widths).
       * Larger = stronger emphasis on the selection.
       */
      ANGLE_PEAK: 20,
      /**
       * Gaussian falloff σ in “ray index” units: how many steps away the taper is noticeable.
       * Larger = smoother, wider halo; smaller = tighter bump on the selected wedge.
       */
      ANGLE_SIGMA: 0.5,
      /** Duration (ms) for animated transitions between selection states. */
      TRANSITION_MS: 420,
      /**
       * Short label per ray (letter / word). Repeated in order if fewer than RAY_COUNT.
       * Use an empty array to hide labels.
       */
      RAY_LABELS: [
        '1:00', '2:00', '3:00', '4:00', '5:00', '6:00', '7:00', '8:00', '9:00', '10:00', '11:00', '12:00',
      ],
      /** Inset from the viewport edge along the wedge bisector (px). */
      RAY_LABEL_INSET_PX: 48,
      /** Label font size (px) in SVG user units. */
      RAY_LABEL_FONT_SIZE: 15,
      /** Label fill color. */
      RAY_LABEL_COLOR: '#ffffff',
      /**
       * Ray fill colors, repeated in order as needed (one per ray index).
       */
      RAY_COLORS: [
        '#dddddd',
        '#c8c8c8',
        '#b0b0b0',
        '#989898',
        '#808080',
        '#686868',
        '#505050',
        '#3d3d3d',
        '#2a2a2a',
        '#1a1a1a',
        '#111111',
        '#0a0a0a',
        '#050505',
        '#000000',
      ],
      SHOW_DEBUG_READOUT: false,
      /**
       * Intro: each ray enters in order (left edge toward top). One step finishes before
       * the next starts; existing rays shrink equally to make room. Duration per step (ms).
       */
      INTRO_EACH_MS: 420,
    };

    const svgNS = 'http://www.w3.org/2000/svg';

    /** First hit of a ray from (0,0) at angle (from +x axis, clockwise/y-down) with the rect [0,w]×[0,h]. */
    const rayToRectBoundary = (w, h, angle) => {
      if (angle <= 1e-10) return { x: w, y: 0 };
      if (angle >= Math.PI / 2 - 1e-10) return { x: 0, y: h };
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      const tBottom = h / sin;
      const xAtBottom = tBottom * cos;
      if (xAtBottom <= w + 1e-9) return { x: xAtBottom, y: h };
      const tRight = w / cos;
      return { x: w, y: tRight * sin };
    };

    /** Wedge from angle a1 to a2 (radians), covering the viewport from the origin. */
    const wedgePolygon = (w, h, a1, a2) => {
      const p1 = rayToRectBoundary(w, h, a1);
      const p2 = rayToRectBoundary(w, h, a2);
      const corners = [
        { x: w, y: 0, a: 0 },
        { x: w, y: h, a: Math.atan2(h, w) },
        { x: 0, y: h, a: Math.PI / 2 },
      ];
      const mid = corners.filter((c) => c.a > a1 + 1e-9 && c.a < a2 - 1e-9);
      mid.sort((u, v) => u.a - v.a);
      return [{ x: 0, y: 0 }, p1, ...mid.map((c) => ({ x: c.x, y: c.y })), p2];
    };

    const polygonToPath = (pts) => {
      if (pts.length < 3) return '';
      const [p0, ...rest] = pts;
      let d = `M ${p0.x} ${p0.y}`;
      for (const p of rest) {
        d += ` L ${p.x} ${p.y}`;
      }
      d += ' Z';
      return d;
    };

    const pickColor = (i, palette) => {
      if (!palette.length) return '#888888';
      return palette[i % palette.length];
    };

    /**
     * Per-ray angular widths (radians) summing to halfPi, peaked at activeIndex with Gaussian taper.
     */
    const angularWidths = (activeIndex, n, halfPi, peak, sigma) => {
      const raw = [];
      for (let i = 0; i < n; i++) {
        const d = Math.abs(i - activeIndex);
        const g = Math.exp(-(d * d) / (2 * sigma * sigma));
        raw.push(1 + peak * g);
      }
      const sum = raw.reduce((a, b) => a + b, 0);
      return raw.map((r) => (halfPi * r) / sum);
    };

    /** Cumulative angles θ0…θn (length n+1), θ0=0, θn=halfPi. */
    const cumulativeAngles = (widths, halfPi) => {
      const b = [0];
      let acc = 0;
      for (let i = 0; i < widths.length; i++) {
        acc += widths[i];
        b.push(acc);
      }
      b[b.length - 1] = halfPi;
      return b;
    };

    /** Cumulative angles without forcing the last bound (partial fan; sum may be below halfPi). */
    const cumulativeAnglesPartial = (widths) => {
      const b = [0];
      let acc = 0;
      for (let i = 0; i < widths.length; i++) {
        acc += Math.max(0, widths[i]);
        b.push(acc);
      }
      return b;
    };

    const normalizeWidths = (raw, halfPi) => {
      const safe = raw.map((x) => Math.max(1e-12, x));
      const s = safe.reduce((a, b) => a + b, 0);
      return safe.map((w) => (halfPi * w) / s);
    };

    /** Equal per-ray angular widths (no selection emphasis). */
    const equalAngularWidths = (n, halfPi) =>
      normalizeWidths(new Array(Math.max(1, n)).fill(1), halfPi);

    const easeOutCubic = (t) => 1 - (1 - t) ** 3;

    const clamp01 = (t) => Math.min(1, Math.max(0, t));

    const prefersReducedMotion = () =>
      typeof window.matchMedia === 'function' &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /**
     * Point along wedge bisector, inset from the viewport boundary along that ray by `insetPx`.
     * Returns { x, y, rotationDeg } — bisector angle minus 90° CCW (SVG +angle = CW).
     */
    const labelPlacement = (w, h, a1, a2, insetPx) => {
      const alpha = (a1 + a2) / 2;
      const B = rayToRectBoundary(w, h, alpha);
      const dist = Math.hypot(B.x, B.y);
      const d = Math.max(0, dist - insetPx);
      const x = d * Math.cos(alpha);
      const y = d * Math.sin(alpha);
      const rotationDeg = (alpha * 180) / Math.PI - 90;
      return { x, y, rotationDeg };
    };

    const main = () => {
      const svg = document.getElementById('ray-stage');
      const debugEl = document.getElementById('debug-readout');

      const TAP_MAX_MOVE_PX = 22;
      const SWIPE_MIN_PX = 44;
      /** @type {{ x: number, y: number, id: number } | null} */
      let pointerStart = null;

      const n = Math.max(1, Math.floor(CONFIG.RAY_COUNT));
      const peak = Math.max(0, CONFIG.ANGLE_PEAK);
      const sigma = Math.max(0.35, CONFIG.ANGLE_SIGMA);
      const transitionMs = Math.max(0, CONFIG.TRANSITION_MS);
      const colors = Array.isArray(CONFIG.RAY_COLORS) ? CONFIG.RAY_COLORS : ['#cccccc'];
      const rayLabels = Array.isArray(CONFIG.RAY_LABELS) ? CONFIG.RAY_LABELS : [];
      const labelInsetPx = Math.max(0, CONFIG.RAY_LABEL_INSET_PX);
      const labelFontSize = Math.max(6, CONFIG.RAY_LABEL_FONT_SIZE);
      const labelColor = CONFIG.RAY_LABEL_COLOR || '#ffffff';

      if (!CONFIG.SHOW_DEBUG_READOUT) {
        debugEl.style.display = 'none';
      }

      /** Logical selection: -1 = no ray emphasized (equal widths), 0…n−1 = tapered to that ray. */
      let activeIndex = -1;
      let introComplete = false;
      let lastW = 0;
      let lastH = 0;
      const groups = [];
      const paths = [];
      /** Paths inside each ray’s `<clipPath>`; same `d` as the wedge fill path. */
      const clipPathPaths = [];
      const labels = [];
      /** Last applied angular widths (rad), length n, sum π/2 — start of next animation. */
      let currentWidths = [];
      let animRaf = null;
      let introRaf = null;

      const halfPi = Math.PI / 2;

      /** Geometric wedge index (0 = along +x … n−1 = along +y) from logical “first ray” index (0 = black / A). */
      const geoFromLogical = (logical) => n - 1 - logical;

      /**
       * @param {number[]} widths
       * @param {{ normalize?: boolean, skipLabels?: boolean, labelOpacities?: number[] }} [opts]
       */
      const applyWidths = (widths, opts = {}) => {
        const normalize = opts.normalize !== false;
        const skipLabels = opts.skipLabels === true;
        const labelOpacities = opts.labelOpacities;
        const w = lastW;
        const h = lastH;
        if (w < 1 || h < 1 || paths.length !== n || clipPathPaths.length !== n) return;
        const norm = normalize ? normalizeWidths(widths, halfPi) : widths.map((x) => Math.max(0, x));
        if (normalize) {
          currentWidths = norm;
        }
        const bounds = normalize ? cumulativeAngles(norm, halfPi) : cumulativeAnglesPartial(norm);
        for (let i = 0; i < n; i++) {
          const a1 = bounds[i];
          const a2 = bounds[i + 1];
          if (a2 - a1 < 1e-9) {
            paths[i].setAttribute('d', '');
            clipPathPaths[i].setAttribute('d', '');
          } else {
            const pts = wedgePolygon(w, h, a1, a2);
            const d = polygonToPath(pts);
            paths[i].setAttribute('d', d);
            clipPathPaths[i].setAttribute('d', d);
          }
        }
        if (skipLabels) {
          for (let i = 0; i < n; i++) {
            labels[i].setAttribute('display', 'none');
          }
        } else if (labels.length === n && rayLabels.length > 0) {
          for (let i = 0; i < n; i++) {
            const a1 = bounds[i];
            const a2 = bounds[i + 1];
            const str = String(rayLabels[(n - 1 - i) % rayLabels.length]);
            const { x, y, rotationDeg } = labelPlacement(
              w,
              h,
              a1,
              a2,
              labelInsetPx,
            );
            const te = labels[i];
            te.textContent = str;
            const op =
              labelOpacities != null && labelOpacities.length === n ? labelOpacities[i] : 1;
            if (a2 - a1 < 1e-9 || op < 1e-4) {
              te.setAttribute('display', 'none');
              te.removeAttribute('opacity');
            } else {
              te.removeAttribute('display');
              if (labelOpacities != null && labelOpacities.length === n && op < 1 - 1e-6) {
                te.setAttribute('opacity', String(op));
              } else {
                te.removeAttribute('opacity');
              }
              te.setAttribute('x', x);
              te.setAttribute('y', y);
              te.setAttribute('transform', `rotate(${rotationDeg}, ${x}, ${y})`);
              te.setAttribute('fill', labelColor);
              te.setAttribute('font-size', labelFontSize);
            }
          }
        } else if (labels.length === n) {
          for (let i = 0; i < n; i++) {
            labels[i].textContent = '';
            labels[i].setAttribute('display', 'none');
          }
        }
      };

      const reorderDom = () => {
        if (activeIndex < 0) {
          groups.forEach((g) => {
            g.setAttribute('data-ray-active', 'false');
            svg.appendChild(g);
          });
          return;
        }
        const gSel = geoFromLogical(activeIndex);
        groups.forEach((g, i) => {
          g.setAttribute('data-ray-active', i === gSel ? 'true' : 'false');
          if (i !== gSel) svg.appendChild(g);
        });
        svg.appendChild(groups[gSel]);
      };

      const updateDebug = () => {
        if (!CONFIG.SHOW_DEBUG_READOUT) return;
        if (activeIndex < 0) {
          debugEl.textContent = `no selection (equal) · σ=${sigma.toFixed(2)}  peak=${peak.toFixed(2)}`;
        } else {
          debugEl.textContent = `ray ${activeIndex + 1} / ${n}  ·  taper σ=${sigma.toFixed(2)}  peak=${peak.toFixed(2)}`;
        }
      };

      const cancelIntro = () => {
        if (introRaf != null) {
          cancelAnimationFrame(introRaf);
          introRaf = null;
        }
      };

      const cancelWidthAnimation = () => {
        cancelIntro();
        if (animRaf != null) {
          cancelAnimationFrame(animRaf);
          animRaf = null;
        }
      };

      /** Instant geometry (resize, first paint) — no tween. `index` is -1 (unset) or 0…n−1. */
      const snapToState = (index) => {
        cancelWidthAnimation();
        activeIndex = index;
        const target =
          activeIndex === -1
            ? equalAngularWidths(n, halfPi)
            : angularWidths(geoFromLogical(activeIndex), n, halfPi, peak, sigma);
        applyWidths(target, { normalize: true, skipLabels: false });
        reorderDom();
        updateDebug();
      };

      const runIntro = () => {
        if (paths.length !== n) return;
        cancelWidthAnimation();
        const each = Math.max(1, CONFIG.INTRO_EACH_MS);
        activeIndex = -1;
        reorderDom();
        updateDebug();

        /** Left edge → top: geo indices n−1, n−2, …, 0. */
        const introGeoOrder = Array.from({ length: n }, (_, i) => n - 1 - i);

        /** `visibleCount` rays present, sharing the quadrant equally; order follows introGeoOrder. */
        const introWidthsForStep = (visibleCount) => {
          const eff = new Array(n).fill(0);
          if (visibleCount <= 0) return eff;
          const w = halfPi / visibleCount;
          for (let i = 0; i < visibleCount; i++) {
            eff[introGeoOrder[i]] = w;
          }
          return eff;
        };

        let step = 0;
        let phaseStart = performance.now();

        const tick = (now) => {
          const fromW = introWidthsForStep(step);
          const toW = introWidthsForStep(step + 1);
          const t = clamp01((now - phaseStart) / each);
          const e = easeOutCubic(t);
          const eff = fromW.map((f, i) => f + (toW[i] - f) * e);
          const newGeo = introGeoOrder[step];
          const labelOpacities = new Array(n);
          for (let i = 0; i < n; i++) {
            if (eff[i] < 1e-9) labelOpacities[i] = 0;
            else if (i === newGeo) labelOpacities[i] = e;
            else labelOpacities[i] = 1;
          }
          applyWidths(eff, { normalize: false, skipLabels: false, labelOpacities });

          if (t < 1 - 1e-6) {
            introRaf = requestAnimationFrame(tick);
            return;
          }

          if (step === n - 1) {
            introRaf = null;
            introComplete = true;
            snapToState(-1);
            return;
          }

          step += 1;
          phaseStart = now;
          introRaf = requestAnimationFrame(tick);
        };

        introRaf = requestAnimationFrame(tick);
      };

      const animateToState = (index) => {
        if (!introComplete) return;
        if (paths.length !== n) return;

        cancelWidthAnimation();
        activeIndex = index;
        const toW =
          activeIndex === -1
            ? equalAngularWidths(n, halfPi)
            : angularWidths(geoFromLogical(activeIndex), n, halfPi, peak, sigma);
        const fromW =
          currentWidths.length === n ? currentWidths.slice() : toW.slice();
        reorderDom();
        updateDebug();

        if (transitionMs <= 0) {
          applyWidths(toW);
          return;
        }

        const start = performance.now();

        const tick = (now) => {
          const t = Math.min(1, (now - start) / transitionMs);
          const e = easeOutCubic(t);
          const blended = fromW.map((f, i) => f + (toW[i] - f) * e);
          applyWidths(blended);
          if (t < 1) {
            animRaf = requestAnimationFrame(tick);
          } else {
            animRaf = null;
            applyWidths(toW);
          }
        };

        animRaf = requestAnimationFrame(tick);
      };

      const nextRay = () => {
        let next;
        if (activeIndex === -1) next = 0;
        else if (activeIndex === n - 1) next = -1;
        else next = activeIndex + 1;
        animateToState(next);
      };

      const prevRay = () => {
        let next;
        if (activeIndex === -1) next = n - 1;
        else if (activeIndex === 0) next = -1;
        else next = activeIndex - 1;
        animateToState(next);
      };

      const rebuild = () => {
        cancelWidthAnimation();
        introComplete = false;
        const w = window.innerWidth;
        const h = window.innerHeight;
        if (w < 1 || h < 1) return;

        lastW = w;
        lastH = h;

        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        svg.setAttribute('preserveAspectRatio', 'none');

        while (svg.firstChild) svg.removeChild(svg.firstChild);
        groups.length = 0;
        paths.length = 0;
        clipPathPaths.length = 0;
        labels.length = 0;

        const half = Math.PI / 2;
        for (let i = 0; i < n; i++) {
          const a1 = (i / n) * half;
          const a2 = ((i + 1) / n) * half;
          const pts = wedgePolygon(w, h, a1, a2);
          const path = document.createElementNS(svgNS, 'path');
          const d0 = polygonToPath(pts);
          path.setAttribute('d', d0);
          path.setAttribute('fill', pickColor(i, colors));
          path.setAttribute('stroke', 'none');

          const defs = document.createElementNS(svgNS, 'defs');
          const clipEl = document.createElementNS(svgNS, 'clipPath');
          clipEl.setAttribute('id', `ray-clip-${i}`);
          const clipPathPath = document.createElementNS(svgNS, 'path');
          clipPathPath.setAttribute('d', d0);
          clipEl.appendChild(clipPathPath);
          defs.appendChild(clipEl);

          const textEl = document.createElementNS(svgNS, 'text');
          textEl.setAttribute('class', 'ray-label');
          textEl.setAttribute('text-anchor', 'middle');
          textEl.setAttribute('dominant-baseline', 'middle');

          const labelLayer = document.createElementNS(svgNS, 'g');
          labelLayer.setAttribute('clip-path', `url(#ray-clip-${i})`);
          labelLayer.appendChild(textEl);

          const g = document.createElementNS(svgNS, 'g');
          g.classList.add('ray');
          g.setAttribute('data-ray-index', String(n - 1 - i));
          g.setAttribute('data-ray-active', 'false');
          g.appendChild(defs);
          g.appendChild(path);
          g.appendChild(labelLayer);
          svg.appendChild(g);
          groups.push(g);
          paths.push(path);
          clipPathPaths.push(clipPathPath);
          labels.push(textEl);
        }

        if (prefersReducedMotion()) {
          introComplete = true;
          snapToState(-1);
        } else {
          runIntro();
        }
      };

      const onKeydown = (e) => {
        const t = e.target;
        if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) {
          return;
        }
        if (!introComplete) return;
        if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') {
          e.preventDefault();
          nextRay();
        } else if (e.key === 'ArrowUp' || e.key === 'ArrowRight') {
          e.preventDefault();
          prevRay();
        }
      };

      window.addEventListener('keydown', onKeydown, true);

      const onPointerDown = (e) => {
        if (!introComplete) return;
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        pointerStart = { x: e.clientX, y: e.clientY, id: e.pointerId };
        try {
          svg.setPointerCapture(e.pointerId);
        } catch (_) {}
      };

      const finishPointer = (e) => {
        if (!pointerStart || e.pointerId !== pointerStart.id) return;
        try {
          svg.releasePointerCapture(e.pointerId);
        } catch (_) {}
        const sx = pointerStart.x;
        const sy = pointerStart.y;
        pointerStart = null;
        if (!introComplete) return;
        const dx = e.clientX - sx;
        const dy = e.clientY - sy;
        const dist = Math.hypot(dx, dy);
        const w = window.innerWidth;
        if (dist < TAP_MAX_MOVE_PX) {
          const third = w / 3;
          if (e.clientX < third) nextRay();
          else if (e.clientX > w - third) prevRay();
          return;
        }
        if (Math.abs(dx) >= Math.abs(dy) && Math.abs(dx) >= SWIPE_MIN_PX) {
          if (dx < 0) nextRay();
          else prevRay();
        }
      };

      svg.addEventListener('pointerdown', onPointerDown);
      svg.addEventListener('pointerup', finishPointer);
      svg.addEventListener('pointercancel', finishPointer);
      svg.addEventListener('lostpointercapture', (e) => {
        if (pointerStart && pointerStart.id === e.pointerId) pointerStart = null;
      });

      let resizeRaf = 0;
      const onResize = () => {
        cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(rebuild);
      };

      window.addEventListener('resize', onResize);
      rebuild();
    };

    document.addEventListener('DOMContentLoaded', main);
  </script>
</body>

</html>
