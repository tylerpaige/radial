    *,

    .triangle {

    .triangle.right-angle--top-left {
      border-top: solid var(--triangle-height) var(--triangle-color);
      border-bottom: solid 0 transparent;
      border-right: solid var(--triangle-width) transparent;
    }
    .triangle.right-angle--top-right {
      border-top: solid var(--triangle-height) var(--triangle-color);
      border-bottom: solid 0 transparent;
      border-left: solid var(--triangle-width) transparent;
    }
    .triangle.right-angle--bottom-right {
      border-top: solid var(--triangle-height) transparent;
      border-bottom: solid 0 transparent;
      border-right: solid var(--triangle-width) var(--triangle-color);
    }
    .triangle.right-angle--bottom-left {
      border-top: solid var(--triangle-height) transparent;
      border-bottom: solid 0 transparent;
      border-left: solid var(--triangle-width) var(--triangle-color);
    }
  </style>
</head>
