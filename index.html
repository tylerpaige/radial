<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radial rays</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    * {
      margin: 0;
    }

    html {
      -moz-text-size-adjust: none;
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
    }

    body {
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
    }

    input,
    button,
    textarea,
    select {
      font: inherit;
    }

    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      overflow-wrap: break-word;
    }
  </style>
  <style>

    html {
      touch-action: manipulation;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }

    #ray-stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      touch-action: none;
      cursor: default;
      -webkit-tap-highlight-color: transparent;
    }

    #debug-readout {
      position: fixed;
      z-index: 2;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      color: #f0f0f0;
      background: rgba(0, 0, 0, 0.78);
      border-radius: 6px;
      pointer-events: none;
      user-select: none;
      text-align: center;
    }

    #ray-stage .ray-label {
      pointer-events: none;
      user-select: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <svg
    id="ray-stage"
    xmlns="http://www.w3.org/2000/svg"
    role="application"
    tabindex="-1"
    aria-label="Radial rays from the top-left corner. Swipe left or tap the left third of the screen to move forward in the cycle; swipe right or tap the right third to move backward. Arrow keys: Left and Down forward; Up and Right backward."
  ></svg>
  <div id="debug-readout" aria-hidden="true"></div>

  <script type="module">
    import { createRadialClock } from './js/radial-clock.js';

    /** Clock + presentation tuning (passed to `createRadialClock`). */
    const CLOCK = {
      rayCount: 12,
      anglePeak: 20,
      angleSigma: 0.5,
      transitionMs: 420,
      introEachMs: 420,
      rayLabels: [
        '12:00', '1:00', '2:00', '3:00', '4:00', '5:00',
        '6:00', '7:00', '8:00', '9:00', '10:00', '11:00',
      ],
      rayInsetPx: 48,
      rayLabelFontSize: 15,
      rayLabelColor: '#ffffff',
      rayColors: [
        '#dddddd', '#c8c8c8', '#b0b0b0', '#989898', '#808080', '#686868',
        '#505050', '#3d3d3d', '#2a2a2a', '#1a1a1a', '#111111', '#0a0a0a',
        '#050505', '#000000',
      ],
      showDebugReadout: false,
    };

    const main = () => {
      const svg = document.getElementById('ray-stage');
      const debugEl = document.getElementById('debug-readout');
      const { start } = createRadialClock(svg, {
        clock: CLOCK,
        debugElement: debugEl,
      });
      start();
    };

    document.addEventListener('DOMContentLoaded', main);
  </script>
</body>

</html>
