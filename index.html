<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radial rays</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    * {
      margin: 0;
    }

    html {
      -moz-text-size-adjust: none;
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
    }

    body {
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
    }

    input,
    button,
    textarea,
    select {
      font: inherit;
    }

    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      overflow-wrap: break-word;
    }
  </style>
  <style>

    :root {
      --gap-from-viewport-edge: 0.5rem;
      --ray-label-offset: 6rem;
      --control-gap: 4px;
      --control-size: 48px;
      --control-radius: 9px;
      --control-font-size: 22px;
    }
    html {
      touch-action: manipulation;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }

    #ray-stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    #debug-readout {
      position: fixed;
      z-index: 2;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      color: #f0f0f0;
      background: rgba(0, 0, 0, 0.78);
      border-radius: 6px;
      pointer-events: none;
      user-select: none;
      text-align: center;
    }

    .controls {
      position: fixed;
      z-index: 3;
      left: var(--gap-from-viewport-edge);
      bottom: calc(var(--gap-from-viewport-edge) + var(--ray-label-offset));
      display: flex;
      flex-direction: column;
      gap: var(--control-gap);
    }

    .ray-cycle-btn {
      width: var(--control-size);
      height: var(--control-size);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: var(--control-font-size);
      line-height: 1;
      border: none;
      border-radius: var(--control-radius);
      cursor: pointer;
      background: rgba(0, 0, 0, 0.5);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      box-shadow:
        inset 0 0 0 1px #999,
        0 0 0 1px #333;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .ray-cycle-btn--next {
      left: var(--gap-from-viewport-edge);
    }

    .ray-cycle-btn--prev {
      left: var(--gap-from-viewport-edge);
    }

    .ray-cycle-btn:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.6);
      outline-offset: 2px;
    }

    #ray-stage .ray-label {
      pointer-events: none;
      user-select: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <svg
    id="ray-stage"
    xmlns="http://www.w3.org/2000/svg"
    role="application"
    tabindex="-1"
    aria-label="Radial rays from the top-left corner. Left and Down select the next ray; Up and Right select the previous ray."
  ></svg>
  <div id="debug-readout" aria-hidden="true"></div>
  <div class="controls">
    <button type="button" class="ray-cycle-btn ray-cycle-btn--prev" id="ray-btn-prev" aria-label="Previous ray">←</button>
    <button type="button" class="ray-cycle-btn ray-cycle-btn--next" id="ray-btn-next" aria-label="Next ray">→</button>
  </div>

  <script type="text/javascript">
    const CONFIG = {
      /** Number of wedge rays from the top-left corner across the viewport. */
      RAY_COUNT: 14,
      /**
       * Extra angular weight at the selected ray before normalization (0 = equal widths).
       * Larger = stronger emphasis on the selection.
       */
      ANGLE_PEAK: 20,
      /**
       * Gaussian falloff σ in “ray index” units: how many steps away the taper is noticeable.
       * Larger = smoother, wider halo; smaller = tighter bump on the selected wedge.
       */
      ANGLE_SIGMA: 0.5,
      /** Duration (ms) for animated transitions between selection states. */
      TRANSITION_MS: 420,
      /**
       * Short label per ray (letter / word). Repeated in order if fewer than RAY_COUNT.
       * Use an empty array to hide labels.
       */
      RAY_LABELS: [
        'A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L', 'M', 'N',
      ],
      /**
       * Inset from the viewport edge along the wedge bisector (px), typically the cycle
       * control size so labels clear the corner buttons.
       */
      RAY_LABEL_INSET_PX: 48,
      /** Label font size (px) in SVG user units. */
      RAY_LABEL_FONT_SIZE: 15,
      /** Label fill color. */
      RAY_LABEL_COLOR: '#ffffff',
      /**
       * Ray fill colors, repeated in order as needed (one per ray index).
       */
      RAY_COLORS: [
        '#dddddd',
        '#c8c8c8',
        '#b0b0b0',
        '#989898',
        '#808080',
        '#686868',
        '#505050',
        '#3d3d3d',
        '#2a2a2a',
        '#1a1a1a',
        '#111111',
        '#0a0a0a',
        '#050505',
        '#000000',
      ],
      SHOW_DEBUG_READOUT: false,
    };

    const svgNS = 'http://www.w3.org/2000/svg';

    /** First hit of a ray from (0,0) at angle (from +x axis, clockwise/y-down) with the rect [0,w]×[0,h]. */
    const rayToRectBoundary = (w, h, angle) => {
      if (angle <= 1e-10) return { x: w, y: 0 };
      if (angle >= Math.PI / 2 - 1e-10) return { x: 0, y: h };
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      const tBottom = h / sin;
      const xAtBottom = tBottom * cos;
      if (xAtBottom <= w + 1e-9) return { x: xAtBottom, y: h };
      const tRight = w / cos;
      return { x: w, y: tRight * sin };
    };

    /** Wedge from angle a1 to a2 (radians), covering the viewport from the origin. */
    const wedgePolygon = (w, h, a1, a2) => {
      const p1 = rayToRectBoundary(w, h, a1);
      const p2 = rayToRectBoundary(w, h, a2);
      const corners = [
        { x: w, y: 0, a: 0 },
        { x: w, y: h, a: Math.atan2(h, w) },
        { x: 0, y: h, a: Math.PI / 2 },
      ];
      const mid = corners.filter((c) => c.a > a1 + 1e-9 && c.a < a2 - 1e-9);
      mid.sort((u, v) => u.a - v.a);
      return [{ x: 0, y: 0 }, p1, ...mid.map((c) => ({ x: c.x, y: c.y })), p2];
    };

    const polygonToPath = (pts) => {
      if (pts.length < 3) return '';
      const [p0, ...rest] = pts;
      let d = `M ${p0.x} ${p0.y}`;
      for (const p of rest) {
        d += ` L ${p.x} ${p.y}`;
      }
      d += ' Z';
      return d;
    };

    const pickColor = (i, palette) => {
      if (!palette.length) return '#888888';
      return palette[i % palette.length];
    };

    /**
     * Per-ray angular widths (radians) summing to halfPi, peaked at activeIndex with Gaussian taper.
     */
    const angularWidths = (activeIndex, n, halfPi, peak, sigma) => {
      const raw = [];
      for (let i = 0; i < n; i++) {
        const d = Math.abs(i - activeIndex);
        const g = Math.exp(-(d * d) / (2 * sigma * sigma));
        raw.push(1 + peak * g);
      }
      const sum = raw.reduce((a, b) => a + b, 0);
      return raw.map((r) => (halfPi * r) / sum);
    };

    /** Cumulative angles θ0…θn (length n+1), θ0=0, θn=halfPi. */
    const cumulativeAngles = (widths, halfPi) => {
      const b = [0];
      let acc = 0;
      for (let i = 0; i < widths.length; i++) {
        acc += widths[i];
        b.push(acc);
      }
      b[b.length - 1] = halfPi;
      return b;
    };

    const normalizeWidths = (raw, halfPi) => {
      const safe = raw.map((x) => Math.max(1e-12, x));
      const s = safe.reduce((a, b) => a + b, 0);
      return safe.map((w) => (halfPi * w) / s);
    };

    const easeOutCubic = (t) => 1 - (1 - t) ** 3;

    /**
     * Point along wedge bisector, inset from the viewport boundary along that ray by `insetPx`.
     * Returns { x, y, rotationDeg } — bisector angle minus 90° CCW (SVG +angle = CW).
     */
    const labelPlacement = (w, h, a1, a2, insetPx) => {
      const alpha = (a1 + a2) / 2;
      const B = rayToRectBoundary(w, h, alpha);
      const dist = Math.hypot(B.x, B.y);
      const d = Math.max(0, dist - insetPx);
      const x = d * Math.cos(alpha);
      const y = d * Math.sin(alpha);
      const rotationDeg = (alpha * 180) / Math.PI - 90;
      return { x, y, rotationDeg };
    };

    const main = () => {
      const svg = document.getElementById('ray-stage');
      const debugEl = document.getElementById('debug-readout');
      const btnNext = document.getElementById('ray-btn-next');
      const btnPrev = document.getElementById('ray-btn-prev');

      const n = Math.max(1, Math.floor(CONFIG.RAY_COUNT));
      const peak = Math.max(0, CONFIG.ANGLE_PEAK);
      const sigma = Math.max(0.35, CONFIG.ANGLE_SIGMA);
      const transitionMs = Math.max(0, CONFIG.TRANSITION_MS);
      const colors = Array.isArray(CONFIG.RAY_COLORS) ? CONFIG.RAY_COLORS : ['#cccccc'];
      const rayLabels = Array.isArray(CONFIG.RAY_LABELS) ? CONFIG.RAY_LABELS : [];
      const labelInsetPx = Math.max(0, CONFIG.RAY_LABEL_INSET_PX);
      const labelFontSize = Math.max(6, CONFIG.RAY_LABEL_FONT_SIZE);
      const labelColor = CONFIG.RAY_LABEL_COLOR || '#ffffff';

      if (!CONFIG.SHOW_DEBUG_READOUT) {
        debugEl.style.display = 'none';
      }

      let activeIndex = 0;
      let lastW = 0;
      let lastH = 0;
      const groups = [];
      const paths = [];
      const labels = [];
      /** Last applied angular widths (rad), length n, sum π/2 — start of next animation. */
      let currentWidths = [];
      let animRaf = null;

      const halfPi = Math.PI / 2;

      /** Geometric wedge index (0 = along +x … n−1 = along +y) from logical “first ray” index (0 = black / A). */
      const geoFromLogical = (logical) => n - 1 - logical;

      const applyWidths = (widths) => {
        const w = lastW;
        const h = lastH;
        if (w < 1 || h < 1 || paths.length !== n) return;
        const norm = normalizeWidths(widths, halfPi);
        currentWidths = norm;
        const bounds = cumulativeAngles(norm, halfPi);
        for (let i = 0; i < n; i++) {
          const pts = wedgePolygon(w, h, bounds[i], bounds[i + 1]);
          paths[i].setAttribute('d', polygonToPath(pts));
        }
        if (labels.length === n && rayLabels.length > 0) {
          for (let i = 0; i < n; i++) {
            const str = String(rayLabels[(n - 1 - i) % rayLabels.length]);
            const { x, y, rotationDeg } = labelPlacement(
              w,
              h,
              bounds[i],
              bounds[i + 1],
              labelInsetPx,
            );
            const te = labels[i];
            te.textContent = str;
            te.removeAttribute('display');
            te.setAttribute('x', x);
            te.setAttribute('y', y);
            te.setAttribute('transform', `rotate(${rotationDeg}, ${x}, ${y})`);
            te.setAttribute('fill', labelColor);
            te.setAttribute('font-size', labelFontSize);
          }
        } else if (labels.length === n) {
          for (let i = 0; i < n; i++) {
            labels[i].textContent = '';
            labels[i].setAttribute('display', 'none');
          }
        }
      };

      const reorderDom = () => {
        const gSel = geoFromLogical(activeIndex);
        groups.forEach((g, i) => {
          g.setAttribute('data-ray-active', i === gSel ? 'true' : 'false');
          if (i !== gSel) svg.appendChild(g);
        });
        svg.appendChild(groups[gSel]);
      };

      const updateDebug = () => {
        if (!CONFIG.SHOW_DEBUG_READOUT) return;
        debugEl.textContent = `ray ${activeIndex + 1} / ${n}  ·  taper σ=${sigma.toFixed(2)}  peak=${peak.toFixed(2)}`;
      };

      const cancelWidthAnimation = () => {
        if (animRaf != null) {
          cancelAnimationFrame(animRaf);
          animRaf = null;
        }
      };

      /** Instant geometry (resize, first paint) — no tween. */
      const snapToSelection = (index) => {
        cancelWidthAnimation();
        activeIndex = ((index % n) + n) % n;
        const target = angularWidths(geoFromLogical(activeIndex), n, halfPi, peak, sigma);
        applyWidths(target);
        reorderDom();
        updateDebug();
      };

      const animateToSelection = (index) => {
        const next = ((index % n) + n) % n;
        if (paths.length !== n) return;

        cancelWidthAnimation();
        activeIndex = next;
        const toW = angularWidths(geoFromLogical(activeIndex), n, halfPi, peak, sigma);
        const fromW =
          currentWidths.length === n ? currentWidths.slice() : toW.slice();
        reorderDom();
        updateDebug();

        if (transitionMs <= 0) {
          applyWidths(toW);
          return;
        }

        const start = performance.now();

        const tick = (now) => {
          const t = Math.min(1, (now - start) / transitionMs);
          const e = easeOutCubic(t);
          const blended = fromW.map((f, i) => f + (toW[i] - f) * e);
          applyWidths(blended);
          if (t < 1) {
            animRaf = requestAnimationFrame(tick);
          } else {
            animRaf = null;
            applyWidths(toW);
          }
        };

        animRaf = requestAnimationFrame(tick);
      };

      const nextRay = () => animateToSelection(activeIndex + 1);
      const prevRay = () => animateToSelection(activeIndex - 1);

      const rebuild = () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        if (w < 1 || h < 1) return;

        lastW = w;
        lastH = h;

        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        svg.setAttribute('preserveAspectRatio', 'none');

        while (svg.firstChild) svg.removeChild(svg.firstChild);
        groups.length = 0;
        paths.length = 0;
        labels.length = 0;

        const half = Math.PI / 2;
        for (let i = 0; i < n; i++) {
          const a1 = (i / n) * half;
          const a2 = ((i + 1) / n) * half;
          const pts = wedgePolygon(w, h, a1, a2);
          const path = document.createElementNS(svgNS, 'path');
          path.setAttribute('d', polygonToPath(pts));
          path.setAttribute('fill', pickColor(i, colors));
          path.setAttribute('stroke', 'none');

          const textEl = document.createElementNS(svgNS, 'text');
          textEl.setAttribute('class', 'ray-label');
          textEl.setAttribute('text-anchor', 'middle');
          textEl.setAttribute('dominant-baseline', 'middle');

          const g = document.createElementNS(svgNS, 'g');
          g.classList.add('ray');
          g.setAttribute('data-ray-index', String(n - 1 - i));
          g.setAttribute('data-ray-active', 'false');
          g.appendChild(path);
          g.appendChild(textEl);
          svg.appendChild(g);
          groups.push(g);
          paths.push(path);
          labels.push(textEl);
        }

        snapToSelection(activeIndex);
      };

      const onKeydown = (e) => {
        const t = e.target;
        if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) {
          return;
        }
        if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') {
          e.preventDefault();
          nextRay();
        } else if (e.key === 'ArrowUp' || e.key === 'ArrowRight') {
          e.preventDefault();
          prevRay();
        }
      };

      window.addEventListener('keydown', onKeydown, true);
      btnNext.addEventListener('click', nextRay);
      btnPrev.addEventListener('click', prevRay);

      let resizeRaf = 0;
      const onResize = () => {
        cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(rebuild);
      };

      window.addEventListener('resize', onResize);
      rebuild();
    };

    document.addEventListener('DOMContentLoaded', main);
  </script>
</body>

</html>
