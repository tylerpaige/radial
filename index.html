<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radial rays</title>
  <!-- CSS reset -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    * {
      margin: 0;
    }

    html {
      -moz-text-size-adjust: none;
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
    }

    body {
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
    }

    input,
    button,
    textarea,
    select {
      font: inherit;
    }

    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      overflow-wrap: break-word;
    }
  </style>
  <!-- Application styles -->
  <style>
    :root {
      --gap-from-viewport-edge: 0.5rem;
      --control-gap: 4px;
      --control-size: 48px;
      --control-radius: 9px;
      --control-font-size: 22px;
      --ray-font-size: 15px;
    }

    html {
      touch-action: manipulation;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }

    #ray-wrap {
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #ray-stage {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    #debug-readout {
      position: fixed;
      z-index: 2;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      color: #f0f0f0;
      background: rgba(0, 0, 0, 0.78);
      border-radius: 6px;
      pointer-events: none;
      user-select: none;
      text-align: center;
    }

    #ray-stage .ray path {
      cursor: pointer;
    }

    #ray-stage .ray-label {
      pointer-events: none;
      user-select: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-weight: 600;
    }

    .mobile-type-btn {
      display: none;
      position: fixed;
      z-index: 4;
      left: max(var(--gap-from-viewport-edge), env(safe-area-inset-left));
      top: max(var(--gap-from-viewport-edge), env(safe-area-inset-left));
      width: var(--control-size);
      height: var(--control-size);
      padding: 0;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: var(--control-font-size);
      line-height: 1;
      border: none;
      border-radius: var(--control-radius);
      cursor: pointer;
      background: rgba(0, 0, 0, 0.5);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      box-shadow:
        inset 0 0 0 1px #999,
        0 0 0 1px #333;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .mobile-type-btn:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.6);
      outline-offset: 2px;
    }

    @media (max-width: 768px) {
      .mobile-type-btn {
        display: flex;
      }

      body.mobile-input-active .mobile-type-btn {
        display: none;
      }
    }

    .mobile-type-panel {
      display: none;
      position: fixed;
      z-index: 5;
      left: 0;
      right: 0;
      bottom: 0;
      padding: var(--gap-from-viewport-edge);
      padding-bottom: max(var(--gap-from-viewport-edge), env(safe-area-inset-bottom));
      background: rgba(26, 26, 26, 0.92);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.45);
      box-sizing: border-box;
    }

    /**
     * While open, #ray-wrap + panel placement are driven by JS from visualViewport
     * so the input sits below the rays without overlapping.
     */
    body.mobile-input-active .mobile-type-panel {
      display: block;
      bottom: auto;
    }

    .mobile-type-panel__input {
      width: 100%;
      min-height: var(--control-size);
      padding: 10px 14px;
      color: #f0f0f0;
      border: none;
      border-radius: var(--control-radius);
      background: rgba(0, 0, 0, 0.5);
      box-shadow:
        inset 0 0 0 1px #999,
        0 0 0 1px #333;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      touch-action: manipulation;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .mobile-type-panel__input:focus {
      outline: 2px solid rgba(255, 255, 255, 0.35);
      outline-offset: 1px;
    }

    .mobile-type-panel__input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }
  </style>
</head>

<body>
  <div id="ray-wrap">
    <svg
      id="ray-stage"
      xmlns="http://www.w3.org/2000/svg"
      role="application"
      tabindex="0"
      aria-label="Radial rays: type letters to add wedges. Escape clears the cursor; arrows, clicks, or typing restore it."
    ></svg>
  </div>
  <button
    type="button"
    class="mobile-type-btn mobile-type-ui"
    id="mobile-type-btn"
    aria-label="Open keyboard to type text"
    aria-controls="mobile-type-panel"
    aria-expanded="false"
  >⌨</button>
  <div
    id="mobile-type-panel"
    class="mobile-type-panel"
    aria-hidden="true"
  >
    <input
      type="text"
      id="mobile-type-input"
      class="mobile-type-panel__input"
      autocomplete="off"
      autocorrect="on"
      autocapitalize="sentences"
      spellcheck="false"
      enterkeyhint="done"
      placeholder="Type here…"
      aria-label="Message text"
    />
  </div>
  <div id="debug-readout" aria-hidden="true"></div>

  <script type="text/javascript">
    const CONFIG = {
      /**
       * Text shown on load; split into one ray per character (Unicode code points).
       * Editing the message field updates rays in real time.
       */
      INITIAL_TEXT:
        'Say Hello',
      /**
       * Extra angular weight at the selected ray before normalization (0 = equal widths).
       * Larger = stronger emphasis on the selection.
       */
      ANGLE_PEAK: 20,
      /**
       * Gaussian falloff σ in “ray index” units: how many steps away the taper is noticeable.
       * Larger = smoother, wider halo; smaller = tighter bump on the selected wedge.
       */
      ANGLE_SIGMA: 0.5,
      /** Duration (ms) for animated transitions between selection states. */
      TRANSITION_MS: 420,
      /**
       * Inset from the viewport edge along the wedge bisector (px), typically the cycle
       * control size so labels clear the corner buttons.
       */
      RAY_LABEL_INSET_PX: 48,
      /** Label font size (px) in SVG user units. */
      RAY_LABEL_FONT_SIZE: 15,
      /**
       * Per-ray wedge fill (`background`) and label fill (`text`), cycled by geometric ray index.
       * Pairs are chosen for readable contrast on each band.
       */
      RAY_STYLES: [
        { background: '#150000', text: '#ccc' },
        { background: '#001500', text: '#ccc' },
        { background: '#000015', text: '#ccc' },
      ],
      SHOW_DEBUG_READOUT: false,
    };

    const svgNS = 'http://www.w3.org/2000/svg';

    /** First hit of a ray from (0,0) at angle (from +x axis, clockwise/y-down) with the rect [0,w]×[0,h]. */
    const rayToRectBoundary = (w, h, angle) => {
      if (angle <= 1e-10) return { x: w, y: 0 };
      if (angle >= Math.PI / 2 - 1e-10) return { x: 0, y: h };
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      const tBottom = h / sin;
      const xAtBottom = tBottom * cos;
      if (xAtBottom <= w + 1e-9) return { x: xAtBottom, y: h };
      const tRight = w / cos;
      return { x: w, y: tRight * sin };
    };

    /** Wedge from angle a1 to a2 (radians), covering the viewport from the origin. */
    const wedgePolygon = (w, h, a1, a2) => {
      const p1 = rayToRectBoundary(w, h, a1);
      const p2 = rayToRectBoundary(w, h, a2);
      const corners = [
        { x: w, y: 0, a: 0 },
        { x: w, y: h, a: Math.atan2(h, w) },
        { x: 0, y: h, a: Math.PI / 2 },
      ];
      const mid = corners.filter((c) => c.a > a1 + 1e-9 && c.a < a2 - 1e-9);
      mid.sort((u, v) => u.a - v.a);
      return [{ x: 0, y: 0 }, p1, ...mid.map((c) => ({ x: c.x, y: c.y })), p2];
    };

    const polygonToPath = (pts) => {
      if (pts.length < 3) return '';
      const [p0, ...rest] = pts;
      let d = `M ${p0.x} ${p0.y}`;
      for (const p of rest) {
        d += ` L ${p.x} ${p.y}`;
      }
      d += ' Z';
      return d;
    };

    const defaultRayStyle = () => ({ background: '#888888', text: '#ffffff' });

    /** @param {{ background?: string, text?: string }[]} styles */
    const pickRayStyle = (i, styles) => {
      if (!styles.length) return defaultRayStyle();
      const s = styles[i % styles.length];
      const d = defaultRayStyle();
      return {
        background: s.background ?? d.background,
        text: s.text ?? d.text,
      };
    };

    /**
     * Per-ray angular widths (radians) summing to halfPi, peaked at activeIndex with Gaussian taper.
     */
    const angularWidths = (activeIndex, n, halfPi, peak, sigma) => {
      const raw = [];
      for (let i = 0; i < n; i++) {
        const d = Math.abs(i - activeIndex);
        const g = Math.exp(-(d * d) / (2 * sigma * sigma));
        raw.push(1 + peak * g);
      }
      const sum = raw.reduce((a, b) => a + b, 0);
      return raw.map((r) => (halfPi * r) / sum);
    };

    /** Cumulative angles θ0…θn (length n+1), θ0=0, θn=halfPi. */
    const cumulativeAngles = (widths, halfPi) => {
      const b = [0];
      let acc = 0;
      for (let i = 0; i < widths.length; i++) {
        acc += widths[i];
        b.push(acc);
      }
      b[b.length - 1] = halfPi;
      return b;
    };

    const normalizeWidths = (raw, halfPi) => {
      const safe = raw.map((x) => Math.max(1e-12, x));
      const s = safe.reduce((a, b) => a + b, 0);
      return safe.map((w) => (halfPi * w) / s);
    };

    const easeOutCubic = (t) => 1 - (1 - t) ** 3;

    /**
     * Point along wedge bisector, inset from the viewport boundary along that ray by `insetPx`.
     * Returns { x, y, rotationDeg } — bisector angle minus 90° CCW (SVG +angle = CW).
     */
    const labelPlacement = (w, h, a1, a2, insetPx) => {
      const alpha = (a1 + a2) / 2;
      const B = rayToRectBoundary(w, h, alpha);
      const dist = Math.hypot(B.x, B.y);
      const d = Math.max(0, dist - insetPx);
      const x = d * Math.cos(alpha);
      const y = d * Math.sin(alpha);
      const rotationDeg = (alpha * 180) / Math.PI - 90;
      return { x, y, rotationDeg };
    };

    /** One entry per Unicode scalar value (surrogate pairs stay one “letter”). */
    const charsFromString = (s) => Array.from(String(s ?? ''));

    /**
     * Map caret offset (0…string length) to logical ray index 0…len−1: the character
     * immediately to the left of the caret (first/last ray when the caret is at the ends).
     */
    const activeIndexFromCaret = (text, caretPos) => {
      const len = charsFromString(text).length;
      const cp = Math.max(0, Math.min(caretPos ?? 0, len));
      if (len === 0) return 0;
      return Math.min(Math.max(cp - 1, 0), len - 1);
    };

    const main = () => {
      const svg = document.getElementById('ray-stage');
      const rayWrap = document.getElementById('ray-wrap');
      const mobileTypeBtn = document.getElementById('mobile-type-btn');
      const mobileTypePanel = document.getElementById('mobile-type-panel');
      const mobileTypeInput = document.getElementById('mobile-type-input');
      const debugEl = document.getElementById('debug-readout');

      let message = String(CONFIG.INITIAL_TEXT ?? '');
      const initialChars = charsFromString(message);
      let activeIndex = initialChars.length > 0 ? initialChars.length - 1 : 0;
      /** When false, wedges are equal width (Escape); arrows / click / typing set true again. */
      let cursorVisible = true;

      const peak = Math.max(0, CONFIG.ANGLE_PEAK);
      const sigma = Math.max(0.35, CONFIG.ANGLE_SIGMA);
      const transitionMs = Math.max(0, CONFIG.TRANSITION_MS);
      const rayStyles = Array.isArray(CONFIG.RAY_STYLES) ? CONFIG.RAY_STYLES : [];
      const labelInsetPx = Math.max(0, CONFIG.RAY_LABEL_INSET_PX);
      const labelFontSize = Math.max(6, CONFIG.RAY_LABEL_FONT_SIZE);

      if (!CONFIG.SHOW_DEBUG_READOUT) {
        debugEl.style.display = 'none';
      }

      let lastW = 0;
      let lastH = 0;
      /** Current character list (same order as message); length equals ray count. */
      let rayChars = [];
      let n = 0;
      const groups = [];
      const paths = [];
      const labels = [];
      /** Last applied angular widths (rad), length n, sum π/2 — start of next animation. */
      let currentWidths = [];
      let animRaf = null;

      let mobileInputOpen = false;

      const clearMobilePanelLayout = () => {
        mobileTypePanel.style.top = '';
        mobileTypePanel.style.left = '';
        mobileTypePanel.style.right = '';
        mobileTypePanel.style.width = '';
        mobileTypePanel.style.bottom = '';
      };

      const updateRayViewportSize = () => {
        if (!mobileInputOpen) {
          rayWrap.style.width = '';
          rayWrap.style.height = '';
          rayWrap.style.top = '';
          rayWrap.style.left = '';
          clearMobilePanelLayout();
        } else {
          const rect = mobileTypePanel.getBoundingClientRect();
          const measured = Math.max(rect.height, mobileTypePanel.offsetHeight);
          const panelH = measured > 0 ? measured : 72;
          const vv = window.visualViewport;
          if (vv) {
            const availH = Math.max(1, vv.height - panelH);
            rayWrap.style.width = `${vv.width}px`;
            rayWrap.style.height = `${availH}px`;
            rayWrap.style.top = `${vv.offsetTop}px`;
            rayWrap.style.left = `${vv.offsetLeft}px`;
            mobileTypePanel.style.left = `${vv.offsetLeft}px`;
            mobileTypePanel.style.right = 'auto';
            mobileTypePanel.style.width = `${vv.width}px`;
            mobileTypePanel.style.top = `${vv.offsetTop + availH}px`;
            mobileTypePanel.style.bottom = 'auto';
          } else {
            const h = Math.max(1, window.innerHeight - panelH);
            rayWrap.style.width = '100%';
            rayWrap.style.height = `${h}px`;
            rayWrap.style.top = '0';
            rayWrap.style.left = '0';
            clearMobilePanelLayout();
            mobileTypePanel.style.left = '0';
            mobileTypePanel.style.right = '0';
            mobileTypePanel.style.width = '';
            mobileTypePanel.style.bottom = '0';
            mobileTypePanel.style.top = 'auto';
          }
        }
        rebuild();
      };

      const onVisualViewportChange = () => {
        if (mobileInputOpen) updateRayViewportSize();
      };

      const closeMobileInput = () => {
        if (!mobileInputOpen) return;
        const vv = window.visualViewport;
        if (vv) {
          vv.removeEventListener('resize', onVisualViewportChange);
          vv.removeEventListener('scroll', onVisualViewportChange);
        }
        mobileInputOpen = false;
        document.body.classList.remove('mobile-input-active');
        mobileTypeBtn.setAttribute('aria-expanded', 'false');
        mobileTypePanel.setAttribute('aria-hidden', 'true');
        mobileTypeInput.blur();
        updateRayViewportSize();
        svg.focus({ preventScroll: true });
      };

      const openMobileInput = () => {
        mobileInputOpen = true;
        document.body.classList.add('mobile-input-active');
        mobileTypeBtn.setAttribute('aria-expanded', 'true');
        mobileTypePanel.setAttribute('aria-hidden', 'false');
        mobileTypeInput.value = message;
        const vv = window.visualViewport;
        if (vv) {
          vv.addEventListener('resize', onVisualViewportChange);
          vv.addEventListener('scroll', onVisualViewportChange);
        }
        requestAnimationFrame(() => {
          updateRayViewportSize();
          mobileTypeInput.focus({ preventScroll: true });
          requestAnimationFrame(() => {
            updateRayViewportSize();
            applyMobileCaretToRay();
          });
        });
      };

      const halfPi = Math.PI / 2;

      /** Geometric wedge index (0 = along +x … n−1 = along +y) from logical “first ray” index (0 = black / A). */
      const geoFromLogical = (logical) => n - 1 - logical;

      const applyWidths = (widths) => {
        const w = lastW;
        const h = lastH;
        if (n < 1 || w < 1 || h < 1 || paths.length !== n) return;
        const norm = normalizeWidths(widths, halfPi);
        currentWidths = norm;
        const bounds = cumulativeAngles(norm, halfPi);
        for (let i = 0; i < n; i++) {
          const pts = wedgePolygon(w, h, bounds[i], bounds[i + 1]);
          paths[i].setAttribute('d', polygonToPath(pts));
        }
        for (let i = 0; i < n; i++) {
          const str = String(rayChars[n - 1 - i] ?? '');
          const { x, y, rotationDeg } = labelPlacement(
            w,
            h,
            bounds[i],
            bounds[i + 1],
            labelInsetPx,
          );
          const te = labels[i];
          te.textContent = str;
          te.removeAttribute('display');
          te.setAttribute('x', x);
          te.setAttribute('y', y);
          te.setAttribute('transform', `rotate(${rotationDeg}, ${x}, ${y})`);
          te.setAttribute('fill', pickRayStyle(i, rayStyles).text);
          te.setAttribute('font-size', labelFontSize);
        }
      };

      const reorderDom = () => {
        if (n < 1 || groups.length !== n || !cursorVisible) return;
        const gSel = geoFromLogical(activeIndex);
        groups.forEach((g, i) => {
          g.setAttribute('data-ray-active', i === gSel ? 'true' : 'false');
          if (i !== gSel) svg.appendChild(g);
        });
        svg.appendChild(groups[gSel]);
      };

      const updateDebug = () => {
        if (!CONFIG.SHOW_DEBUG_READOUT) return;
        const cursor = cursorVisible ? 'on' : 'off';
        debugEl.textContent =
          n < 1
            ? `no rays  ·  cursor ${cursor}  ·  σ=${sigma.toFixed(2)}  peak=${peak.toFixed(2)}`
            : `ray ${activeIndex + 1} / ${n}  ·  cursor ${cursor}  ·  σ=${sigma.toFixed(2)}  peak=${peak.toFixed(2)}`;
      };

      const cancelWidthAnimation = () => {
        if (animRaf != null) {
          cancelAnimationFrame(animRaf);
          animRaf = null;
        }
      };

      const equalRayWidths = () => Array(n).fill(halfPi / n);

      /** Apply activeIndex + cursorVisible with no animation. */
      const snapVisualState = () => {
        cancelWidthAnimation();
        if (n < 1) {
          updateDebug();
          return;
        }
        if (!cursorVisible) {
          applyWidths(equalRayWidths());
          updateDebug();
          return;
        }
        const target = angularWidths(geoFromLogical(activeIndex), n, halfPi, peak, sigma);
        applyWidths(target);
        reorderDom();
        updateDebug();
      };

      const clearCursor = () => {
        cursorVisible = false;
        cancelWidthAnimation();
        if (n < 1) {
          updateDebug();
          return;
        }
        applyWidths(equalRayWidths());
        updateDebug();
      };

      const animateToSelection = (index) => {
        if (n < 1) return;
        const next = ((index % n) + n) % n;
        if (paths.length !== n) return;

        cancelWidthAnimation();
        cursorVisible = true;
        activeIndex = next;
        const toW = angularWidths(geoFromLogical(activeIndex), n, halfPi, peak, sigma);
        const fromW =
          currentWidths.length === n ? currentWidths.slice() : toW.slice();
        reorderDom();
        updateDebug();

        if (transitionMs <= 0) {
          applyWidths(toW);
          return;
        }

        const start = performance.now();

        const tick = (now) => {
          const t = Math.min(1, (now - start) / transitionMs);
          const e = easeOutCubic(t);
          const blended = fromW.map((f, i) => f + (toW[i] - f) * e);
          applyWidths(blended);
          if (t < 1) {
            animRaf = requestAnimationFrame(tick);
          } else {
            animRaf = null;
            applyWidths(toW);
          }
        };

        animRaf = requestAnimationFrame(tick);
      };

      const nextRay = () => animateToSelection(activeIndex + 1);
      const prevRay = () => animateToSelection(activeIndex - 1);

      const rebuild = () => {
        const w = Math.max(1, Math.floor(rayWrap.clientWidth));
        const h = Math.max(1, Math.floor(rayWrap.clientHeight));
        if (w < 1 || h < 1) return;

        lastW = w;
        lastH = h;

        rayChars = charsFromString(message);
        n = rayChars.length;
        if (activeIndex >= n) activeIndex = Math.max(0, n - 1);

        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        svg.setAttribute('preserveAspectRatio', 'none');

        while (svg.firstChild) svg.removeChild(svg.firstChild);
        groups.length = 0;
        paths.length = 0;
        labels.length = 0;

        if (n < 1) {
          currentWidths = [];
          updateDebug();
          return;
        }

        const half = Math.PI / 2;
        for (let i = 0; i < n; i++) {
          const a1 = (i / n) * half;
          const a2 = ((i + 1) / n) * half;
          const pts = wedgePolygon(w, h, a1, a2);
          const path = document.createElementNS(svgNS, 'path');
          path.setAttribute('d', polygonToPath(pts));
          path.setAttribute('fill', pickRayStyle(i, rayStyles).background);
          path.setAttribute('stroke', 'none');
          path.setAttribute('data-geo-ray-index', String(i));

          const textEl = document.createElementNS(svgNS, 'text');
          textEl.setAttribute('class', 'ray-label');
          textEl.setAttribute('text-anchor', 'middle');
          textEl.setAttribute('dominant-baseline', 'middle');

          const g = document.createElementNS(svgNS, 'g');
          g.classList.add('ray');
          g.setAttribute('data-ray-index', String(n - 1 - i));
          g.setAttribute('data-ray-active', 'false');
          g.appendChild(path);
          g.appendChild(textEl);
          svg.appendChild(g);
          groups.push(g);
          paths.push(path);
          labels.push(textEl);

          path.addEventListener('click', (ev) => {
            ev.preventDefault();
            ev.stopPropagation();
            if (n < 1) return;
            const geo = Number(path.getAttribute('data-geo-ray-index'));
            if (Number.isNaN(geo)) return;
            const logical = n - 1 - geo;
            if (mobileInputOpen) {
              closeMobileInput();
              return;
            }
            animateToSelection(logical);
          });
        }

        snapVisualState();
      };

      /** Sync `activeIndex` / fan highlight from the mobile text field caret. */
      const applyMobileCaretToRay = () => {
        if (!mobileInputOpen) return;
        message = mobileTypeInput.value;
        const newN = charsFromString(message).length;
        const nextIdx = activeIndexFromCaret(message, mobileTypeInput.selectionStart);
        const prevIdx = activeIndex;
        activeIndex = nextIdx;
        cursorVisible = true;
        if (newN !== n || paths.length !== newN) {
          rebuild();
          return;
        }
        if (n < 1 || paths.length !== n) return;
        if (nextIdx === prevIdx) return;
        animateToSelection(activeIndex);
      };

      const insertChar = (ch) => {
        const c = charsFromString(message);
        let newC;
        if (c.length === 0) {
          newC = [ch];
          activeIndex = 0;
        } else {
          newC = [...c.slice(0, activeIndex + 1), ch, ...c.slice(activeIndex + 1)];
          activeIndex = activeIndex + 1;
        }
        message = newC.join('');
        cursorVisible = true;
        rebuild();
      };

      const onKeydown = (e) => {
        const t = e.target;
        if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) {
          return;
        }
        if (e.key === 'Escape') {
          e.preventDefault();
          if (mobileInputOpen) {
            closeMobileInput();
            return;
          }
          clearCursor();
          return;
        }
        if (e.key === 'Backspace') {
          e.preventDefault();
          const c = charsFromString(message);
          if (c.length < 1) return;
          cursorVisible = true;
          const newC = [...c.slice(0, activeIndex), ...c.slice(activeIndex + 1)];
          message = newC.join('');
          if (newC.length < 1) {
            activeIndex = 0;
          } else {
            activeIndex = Math.min(activeIndex, newC.length - 1);
          }
          rebuild();
          return;
        }
        if (e.key === 'Delete') {
          e.preventDefault();
          const c = charsFromString(message);
          if (c.length < 1) return;
          cursorVisible = true;
          if (activeIndex < c.length - 1) {
            const newC = [...c.slice(0, activeIndex + 1), ...c.slice(activeIndex + 2)];
            message = newC.join('');
          } else {
            return;
          }
          rebuild();
          return;
        }
        if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
          e.preventDefault();
          if (n < 1) return;
          cursorVisible = true;
          nextRay();
          return;
        }
        if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
          e.preventDefault();
          if (n < 1) return;
          cursorVisible = true;
          prevRay();
          return;
        }
      };

      const onKeypress = (e) => {
        const t = e.target;
        if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) {
          return;
        }
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        const code = e.charCode !== undefined ? e.charCode : e.which;
        if (!code || code < 32) return;
        const ch = String.fromCharCode(code);
        e.preventDefault();
        insertChar(ch);
      };

      window.addEventListener('keydown', onKeydown, true);
      window.addEventListener('keypress', onKeypress, true);

      mobileTypeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        openMobileInput();
      });

      mobileTypeInput.addEventListener('input', () => {
        message = mobileTypeInput.value;
        cursorVisible = true;
        requestAnimationFrame(() => {
          activeIndex = activeIndexFromCaret(message, mobileTypeInput.selectionStart);
          rebuild();
        });
      });

      mobileTypeInput.addEventListener('keyup', (e) => {
        if (!mobileInputOpen || e.isComposing) return;
        applyMobileCaretToRay();
      });

      mobileTypeInput.addEventListener('click', () => {
        if (!mobileInputOpen) return;
        requestAnimationFrame(() => applyMobileCaretToRay());
      });

      mobileTypeInput.addEventListener('select', () => {
        if (!mobileInputOpen) return;
        requestAnimationFrame(() => applyMobileCaretToRay());
      });

      mobileTypeInput.addEventListener('compositionend', () => {
        if (!mobileInputOpen) return;
        requestAnimationFrame(() => applyMobileCaretToRay());
      });

      let caretSyncRaf = null;
      document.addEventListener('selectionchange', () => {
        if (!mobileInputOpen || document.activeElement !== mobileTypeInput) return;
        if (caretSyncRaf != null) cancelAnimationFrame(caretSyncRaf);
        caretSyncRaf = requestAnimationFrame(() => {
          caretSyncRaf = null;
          applyMobileCaretToRay();
        });
      });

      mobileTypeInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' || e.key === 'Enter') {
          e.preventDefault();
          closeMobileInput();
        }
      });

      let resizeRaf = 0;
      const onResize = () => {
        cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(() => {
          if (mobileInputOpen) updateRayViewportSize();
          else rebuild();
        });
      };

      window.addEventListener('resize', onResize);

      if (window.ResizeObserver) {
        const panelLayoutObserver = new ResizeObserver(() => {
          if (mobileInputOpen) updateRayViewportSize();
        });
        panelLayoutObserver.observe(mobileTypePanel);
      }

      svg.addEventListener('pointerdown', (e) => {
        if (e.target === svg && mobileInputOpen) {
          e.preventDefault();
          closeMobileInput();
          return;
        }
        svg.focus({ preventScroll: true });
      });

      const SWIPE_MIN_PX = 48;
      let swipeActive = null;

      const onSwipePointerDown = (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        if (mobileTypePanel.contains(e.target)) return;
        swipeActive = { x: e.clientX, y: e.clientY, id: e.pointerId };
        try {
          rayWrap.setPointerCapture(e.pointerId);
        } catch (_) {
          /* ignore */
        }
      };

      const onSwipePointerUp = (e) => {
        if (!swipeActive || swipeActive.id !== e.pointerId) return;
        const start = swipeActive;
        swipeActive = null;
        try {
          rayWrap.releasePointerCapture(e.pointerId);
        } catch (_) {
          /* ignore */
        }
        const dx = e.clientX - start.x;
        const dy = e.clientY - start.y;
        if (Math.abs(dx) < SWIPE_MIN_PX) return;
        if (Math.abs(dx) <= Math.abs(dy)) return;
        if (n < 1) return;
        cursorVisible = true;
        if (dx > 0) prevRay();
        else nextRay();
      };

      const onSwipePointerCancel = (e) => {
        if (swipeActive && swipeActive.id === e.pointerId) {
          swipeActive = null;
        }
      };

      rayWrap.addEventListener('pointerdown', onSwipePointerDown);
      rayWrap.addEventListener('pointerup', onSwipePointerUp);
      rayWrap.addEventListener('pointercancel', onSwipePointerCancel);

      rebuild();
      svg.focus({ preventScroll: true });
    };

    document.addEventListener('DOMContentLoaded', main);
  </script>
</body>

</html>
